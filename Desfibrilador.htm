<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Desfibrilador (Carga 50 Ohms)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .led { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .led-off { background-color: #334155; box-shadow: none; }
        .led-yellow { background-color: #eab308; box-shadow: 0 0 10px #eab308; }
        .led-green { background-color: #22c55e; box-shadow: 0 0 10px #22c55e; }
        canvas { background-color: #020617; border-radius: 0.5rem; }
    </style>
</head>
<body class="min-h-screen p-6 font-sans flex flex-col items-center">

    <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="col-span-1 bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700 flex flex-col gap-6">
            <h1 class="text-2xl font-bold text-cyan-400 mb-2">Painel de Controle</h1>
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">1. Selecionar Energia</label>
                <select id="energySelect" class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg p-3 outline-none focus:border-cyan-400 transition-colors" onchange="resetSim()">
                    <option value="50">50 J</option>
                    <option value="100">100 J</option>
                    <option value="200">200 J</option>
                    <option value="360" selected>360 J</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">2. Carregar</label>
                <button id="btnCharge" onclick="startCharge()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Carregar
                </button>
                
                <div class="mt-4 flex items-center justify-between text-sm">
                    <span id="statusText" class="text-slate-400 flex items-center gap-2">
                        <span id="statusLed" class="led led-off"></span> Ocioso
                    </span>
                </div>
                <div class="w-full bg-slate-900 rounded-full h-2.5 mt-2 overflow-hidden border border-slate-700">
                    <div id="chargeBar" class="bg-yellow-500 h-2.5 rounded-full" style="width: 0%; transition: width 0.1s linear;"></div>
                </div>
            </div>

            <div class="mt-auto">
                <label class="block text-sm font-medium text-slate-300 mb-2">3. Disparar</label>
                <button id="btnShock" onclick="deliverShock()" disabled class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 px-4 rounded-lg shadow-[0_0_15px_rgba(220,38,38,0.5)] transition-all disabled:opacity-30 disabled:shadow-none disabled:cursor-not-allowed">
                    CHOQUE
                </button>
            </div>
        </div>

        <div class="col-span-1 lg:col-span-2 bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-cyan-400">Osciloscópio (Carga 50 Ω)</h2>
                <button id="btnExport" onclick="exportCSV()" disabled class="bg-slate-700 hover:bg-slate-600 text-white text-sm py-2 px-4 rounded border border-slate-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Exportar CSV 
                </button>
            </div>
            
            <div class="flex-grow relative h-80 w-full">
                <canvas id="oscilloscope"></canvas>
            </div>
            
            <div class="mt-4 flex justify-center text-center">
                <div class="bg-slate-900 p-3 rounded-lg border border-slate-700 min-w-[200px]">
                    <div class="text-xs text-slate-400 uppercase tracking-wider">Energia Selecionada</div>
                    <div class="text-2xl font-mono text-white" id="dispSelected">-- J</div>
                </div>
            </div>
        </div>

    </div>
