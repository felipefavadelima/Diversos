<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pressão, Manguito e Fluxo Radial</title>
  <style>
    :root{
      --bg:#07111c;
      --bg2:#0d1627;
      --panel:rgba(13,22,39,.78);
      --line:rgba(255,255,255,.08);
      --text:#eef4ff;
      --muted:#8fa4c6;
      --cyan:#80e9ff;
      --pink:#ff5f6d;
      --gold:#80e9ff;
      --green:#69f0ae;
      --shadow:0 24px 70px rgba(0,0,0,.35);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 14% 14%, rgba(128,233,255,.10), transparent 22%),
        radial-gradient(circle at 84% 12%, rgba(255,125,183,.10), transparent 22%),
        radial-gradient(circle at 82% 84%, rgba(255,208,127,.08), transparent 22%),
        linear-gradient(145deg,var(--bg),var(--bg2));
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size:28px 28px;
      mask-image:radial-gradient(circle at center, black, transparent 86%);
      opacity:.5;
    }
    .app{
      width:min(1420px, calc(100vw - 28px));
      margin:18px auto;
      display:grid;
      grid-template-columns: 1fr 120px;
      gap:16px;
      align-items:stretch;
    }
    .panel{
      background:linear-gradient(180deg, rgba(12,20,36,.82), rgba(13,23,42,.72));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }
    .slider-panel{
      padding:18px 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:760px;
    }
    .slider-wrap{
      height:100%;
      min-height:700px;
      width:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
      align-items:center;
      justify-items:center;
      gap:14px;
    }
    .slider-label{
      color:var(--muted);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      text-align:center;
      user-select:none;
    }
    .slider-read{
      color:var(--text);
      font-size:30px;
      line-height:1;
      letter-spacing:-.04em;
      font-weight:800;
      font-variant-numeric:tabular-nums;
      text-align:center;
      user-select:none;
    }
    .slider-unit{
      color:var(--muted);
      font-size:12px;
      letter-spacing:.10em;
      text-transform:uppercase;
      text-align:center;
      user-select:none;
    }
    .vertical-holder{
      height:100%;
      min-height:520px;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      position:relative;
    }
    .vertical-range{
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      writing-mode: bt-lr;
      width: 28px;
      height: min(76vh, 560px);
      accent-color: #ffffff;
      display:block;
      cursor:pointer;
      background: transparent;
    }
    .vertical-range::-webkit-slider-runnable-track{
      width:10px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.08));
    }
    .vertical-range::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:22px;
      height:22px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(8,17,28,.85);
      box-shadow:0 4px 14px rgba(0,0,0,.28);
      margin-left:-6px;
    }
    .vertical-range::-moz-range-track{
      width:10px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.08));
    }
    .vertical-range::-moz-range-thumb{
      width:22px;
      height:22px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(8,17,28,.85);
      box-shadow:0 4px 14px rgba(0,0,0,.28);
      cursor:pointer;
    }
    .main{
      padding:16px;
      display:grid;
      gap:16px;
      min-width:0;
    }
    .chart-card{
      padding:14px;
      display:grid;
      gap:10px;
    }
    .chart-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      min-height:24px;
    }
    .caption{
      color:var(--muted);
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .legend{
      display:flex; gap:12px; flex-wrap:wrap;
      color:var(--muted); font-size:12px;
    }
    .legend span{display:flex; align-items:center; gap:7px}
    .sw{
      width:18px; height:4px; border-radius:999px; display:inline-block;
    }
    .sw.cyan{background:var(--cyan)}
    .sw.pink{background:var(--pink)}
    .sw.gold{background:var(--gold)}
    .sw.green{background:var(--green)}
    canvas{
      width:100%;
      display:block;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.020), rgba(255,255,255,.010));
      border:1px solid rgba(255,255,255,.06);
    }
    #mainChart{height:430px}
    #acChart{height:280px}
    @media (max-width: 980px){
      .app{grid-template-columns:1fr}
      .slider-panel{order:2; min-height:auto}
      .main{order:1}
      .slider-wrap{
        min-height:auto;
        grid-template-rows:auto auto auto;
      }
      .vertical-holder{
        min-height:auto;
        height:120px;
      }
      .vertical-range{
        -webkit-appearance:none;
        appearance:none;
        writing-mode:horizontal-tb;
        width:100%;
        max-width:420px;
        height:8px;
        accent-color:#ffffff;
      }
      .vertical-range::-webkit-slider-runnable-track{
        height:8px;
      }
      .vertical-range::-webkit-slider-thumb{
        margin-top:-7px;
      }
      #mainChart{height:320px}
      #acChart{height:230px}
    }
  </style>
</head>
<body>
  
  <div class="app">
    <main class="panel main">
      <section class="panel chart-card">
        <div class="chart-head">
          <div class="caption">tempo (s) × pressão (mmHg) + fluxo braquial (mL/s)</div>
          <div class="legend">
            <span><i class="sw green"></i> arterial</span>
            <span><i class="sw pink"></i> manguito</span>
            <span><i class="sw gold"></i> fluxo braquial</span>
          </div>
        </div>
        <canvas id="mainChart"></canvas>
      </section>

      <section class="panel chart-card">
        <div class="chart-head">
          <div class="caption">tempo (s) × componente AC do manguito (mmHg)</div>
          <div class="legend">
            <span><i class="sw pink"></i> AC do manguito</span>
          </div>
        </div>
        <canvas id="acChart"></canvas>
      </section>
    </main>

    <aside class="panel slider-panel">
      <div class="slider-wrap">
        <div class="slider-read"><span id="cuffRead">80</span><div class="slider-unit">mmHg</div></div>
        <div class="vertical-holder">
          <input class="vertical-range" id="cuffSlider" type="range" min="0" max="220" step="1" value="80" orient="vertical" />
        </div>
        <div class="slider-label">Manguito</div>
      </div>
    </aside>
  </div>

<script>
(() => {
  "use strict";

  const els = {
    cuffSlider: document.getElementById("cuffSlider"),
    cuffRead: document.getElementById("cuffRead"),
    mainChart: document.getElementById("mainChart"),
    acChart: document.getElementById("acChart")
  };

  const mainCtx = els.mainChart.getContext("2d");
  const acCtx = els.acChart.getContext("2d");

  const WINDOW_S = 10;

  const state = {
    cuff: 80,
    sbp: 120,
    dbp: 80,
    map: 93,
    hr: 72,
    art: 95,
    flow: 0.34,
    t: 0,
    lastTs: performance.now(),
    mainData: [],
    acData: [],
    dispMainMin: 0,
    dispMainMax: 180,
    dispAcAbs: 8,
    dispFlowMax: 2.2
  };

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function fmt(v){ return String(Math.round(v)); }
  function beatPeriod(){ return 60 / state.hr; }
  function phaseAt(t){ return (t % beatPeriod()) / beatPeriod(); }
  function smoothstep01(x){ x = clamp(x, 0, 1); return x * x * (3 - 2 * x); }
  function mix(a,b,t){ return a + (b-a)*t; }

  function resizeCanvas(canvas){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const r = canvas.getBoundingClientRect();
    const w = Math.max(1, Math.round(r.width * dpr));
    const h = Math.max(1, Math.round(r.height * dpr));
    if (canvas.width !== w || canvas.height !== h){
      canvas.width = w;
      canvas.height = h;
    }
  }
  function resizeAll(){
    resizeCanvas(els.mainChart);
    resizeCanvas(els.acChart);
  }

  function syncUI(){
    els.cuffRead.textContent = fmt(state.cuff);
  }

  function updateMapLimits(){
    const minMap = state.dbp + 1;
    const maxMap = state.sbp - 1;
    state.map = clamp(state.map, minMap, maxMap);
  }

  function arterialShape(phase){
    if (phase < 0.12) return mix(0.00, 1.00, smoothstep01(phase / 0.12));
    if (phase < 0.30) return mix(1.00, 0.72, smoothstep01((phase - 0.12) / 0.18));
    if (phase < 0.40) return mix(0.72, 0.56, smoothstep01((phase - 0.30) / 0.10));
    if (phase < 0.48) return mix(0.56, 0.66, smoothstep01((phase - 0.40) / 0.08));
    return mix(0.66, 0.00, smoothstep01((phase - 0.48) / 0.52));
  }

  function arterialPressureAt(t){
    const pp = Math.max(10, state.sbp - state.dbp);
    const mapFrac = clamp((state.map - state.dbp) / Math.max(1, pp), 0.18, 0.82);
    let shape = arterialShape(phaseAt(t));
    const runoffLift = 0.10 * (mapFrac - 0.5);
    shape = clamp(shape + runoffLift * Math.max(0, 1 - phaseAt(t)), 0, 1);
    return state.dbp + pp * shape;
  }

  function cuffEnvelope(){
    const span = Math.max(10, state.sbp - state.dbp);
    const sigma = span * 0.34;
    const x = state.cuff - state.map;
    let g = Math.exp(-(x*x)/(2*sigma*sigma));
    if (state.cuff > state.sbp + 18 || state.cuff < state.dbp - 18) g *= 0.18;
    return g;
  }

  function cuffPulseShape(phase){
    const th = 2 * Math.PI * phase;
    return 0.78 * Math.sin(th - Math.PI/2) + 0.22 * Math.sin(2*th - Math.PI/2);
  }

  function cuffACAt(t){
    const amp = 0.35 + 5.6 * cuffEnvelope();
    return amp * cuffPulseShape(phaseAt(t));
  }

  function radialFlowShape(phase){
    if (phase < 0.18) return mix(0.02, 1.00, smoothstep01(phase / 0.18));
    if (phase < 0.36) return mix(1.00, 0.42, smoothstep01((phase - 0.18) / 0.18));
    if (phase < 0.52) return mix(0.42, 0.18, smoothstep01((phase - 0.36) / 0.16));
    return mix(0.18, 0.03, smoothstep01((phase - 0.52) / 0.48));
  }

  function radialFlowAt(t){
    const phase = phaseAt(t);
    const art = arterialPressureAt(t);
    const baseFlow = 1.55 * radialFlowShape(phase); // mL/s, didático e plausível para artéria radial em repouso
    const openFactor = smoothstep01((art - state.cuff + 8) / 34);
    const occlusionBias = smoothstep01((state.sbp + 10 - state.cuff) / 55);
    const flow = baseFlow * openFactor * occlusionBias;
    return Math.max(0, flow);
  }

  function pushPoint(t, art, cuffTotal, flow, ac){
    state.mainData.push({t, art, cuff: cuffTotal, flow});
    state.acData.push({t, ac});
    const cutoff = t - WINDOW_S;
    while (state.mainData.length && state.mainData[0].t < cutoff) state.mainData.shift();
    while (state.acData.length && state.acData[0].t < cutoff) state.acData.shift();
  }

  function updateScales(){
    let minMain = Infinity, maxMain = -Infinity;
    for (const p of state.mainData){
      if (p.art < minMain) minMain = p.art;
      if (p.art > maxMain) maxMain = p.art;
      if (p.cuff < minMain) minMain = p.cuff;
      if (p.cuff > maxMain) maxMain = p.cuff;
    }
    if (!Number.isFinite(minMain) || !Number.isFinite(maxMain)){
      minMain = Math.min(state.dbp, state.cuff) - 10;
      maxMain = Math.max(state.sbp, state.cuff) + 10;
    }
    let targetMin = Math.floor((Math.max(0, minMain - 8)) / 10) * 10;
    let targetMax = Math.ceil((maxMain + 8) / 10) * 10;
    if (targetMax - targetMin < 70){
      const mid = (targetMax + targetMin) / 2;
      targetMin = Math.max(0, Math.floor((mid - 35) / 10) * 10);
      targetMax = Math.ceil((mid + 35) / 10) * 10;
    }
    state.dispMainMin = 0;
    state.dispMainMax = 150;

    let acAbs = 3.5;
    for (const p of state.acData) acAbs = Math.max(acAbs, Math.abs(p.ac));
    const targetAc = Math.max(4, Math.ceil((acAbs * 1.25) / 1) * 1);
    state.dispAcAbs += (targetAc - state.dispAcAbs) * 0.16;

    state.dispFlowMax = 2.2;
  }

  function clearChart(ctx, canvas){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.scale(dpr,dpr);
  }

  function drawGrid(ctx, x0, y0, w, h, vx=10, hy=5, zeroY=null){
    const grad = ctx.createLinearGradient(0, y0, 0, y0+h);
    grad.addColorStop(0, "rgba(255,255,255,.03)");
    grad.addColorStop(1, "rgba(255,255,255,.01)");
    ctx.fillStyle = grad;
    ctx.fillRect(x0,y0,w,h);

    ctx.strokeStyle = "rgba(255,255,255,.06)";
    ctx.lineWidth = 1;
    for (let i=0;i<=vx;i++){
      const x = x0 + i*w/vx;
      ctx.beginPath(); ctx.moveTo(x,y0); ctx.lineTo(x,y0+h); ctx.stroke();
    }
    for (let i=0;i<=hy;i++){
      const y = y0 + i*h/hy;
      ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x0+w,y); ctx.stroke();
    }
    if (Number.isFinite(zeroY)){
      ctx.strokeStyle = "rgba(255,255,255,.16)";
      ctx.beginPath(); ctx.moveTo(x0,zeroY); ctx.lineTo(x0+w,zeroY); ctx.stroke();
    }
    ctx.strokeStyle = "rgba(255,255,255,.10)";
    ctx.strokeRect(x0,y0,w,h);
  }

  function drawText(ctx, txt, x, y, align="center"){
    ctx.fillStyle = "rgba(238,244,255,.74)";
    ctx.font = "12px Inter, system-ui, sans-serif";
    ctx.textAlign = align;
    ctx.textBaseline = "middle";
    ctx.fillText(txt, x, y);
  }

  function drawYAxisLeft(ctx, x0, vals, mapY){
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,.10)";
    ctx.fillStyle = "rgba(238,244,255,.74)";
    ctx.font = "12px Inter, system-ui, sans-serif";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    for (const v of vals){
      const y = mapY(v);
      ctx.beginPath();
      ctx.moveTo(x0 - 5, y);
      ctx.lineTo(x0, y);
      ctx.stroke();
      ctx.fillText(String(v), x0 - 8, y);
    }
    ctx.restore();
  }

  function drawYAxisRight(ctx, x1, vals, mapY){
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,.10)";
    ctx.fillStyle = "rgba(255,255,255,.74)";
    ctx.font = "12px Inter, system-ui, sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    for (const v of vals){
      const y = mapY(v);
      ctx.beginPath();
      ctx.moveTo(x1, y);
      ctx.lineTo(x1 + 5, y);
      ctx.stroke();
      ctx.fillText(v.toFixed(1), x1 + 8, y);
    }
    ctx.restore();
  }

  function drawXAxisTime(ctx, x0, y0, w, tStart, tEnd){
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,.10)";
    ctx.fillStyle = "rgba(238,244,255,.74)";
    ctx.font = "12px Inter, system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    const n = 6;
    for (let i=0;i<=n;i++){
      const frac = i / n;
      const x = x0 + frac*w;
      const val = tStart + frac*(tEnd - tStart);
      ctx.beginPath(); ctx.moveTo(x,y0); ctx.lineTo(x,y0+5); ctx.stroke();
      ctx.fillText(val.toFixed(0), x, y0+8);
    }
    ctx.restore();
  }

  function drawLine(ctx, arr, key, color, width, x0, y0, w, h, yMin, yMax){
    if (!arr.length || yMax <= yMin) return;
    const tEnd = arr[arr.length - 1].t;
    const tStart = tEnd - WINDOW_S;
    ctx.beginPath();
    let started = false;
    for (const p of arr){
      const x = x0 + ((p.t - tStart) / WINDOW_S) * w;
      const y = y0 + h - ((p[key] - yMin) / (yMax - yMin)) * h;
      if (!started){ ctx.moveTo(x,y); started = true; }
      else ctx.lineTo(x,y);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function drawCharts(){
    clearChart(mainCtx, els.mainChart);
    clearChart(acCtx, els.acChart);

    const mainRect = els.mainChart.getBoundingClientRect();
    const acRect = els.acChart.getBoundingClientRect();

    const left = 58, right = 58, top = 16, bottom = 42;
    const mainW = mainRect.width - left - right;
    const mainH = mainRect.height - top - bottom;

    drawGrid(mainCtx, left, top, mainW, mainH, 10, 5);

    const tEnd = state.t;
    const tStart = Math.max(0, tEnd - WINDOW_S);

    const mainMapY = v => top + mainH - ((v - state.dispMainMin) / (state.dispMainMax - state.dispMainMin)) * mainH;
    const flowMapY = v => top + mainH - (v / Math.max(0.6, state.dispFlowMax)) * mainH;

    drawYAxisLeft(mainCtx, left, [0,30,60,90,120,150], mainMapY);
    const flowTicks = [0, 0.55, 1.1, 1.65, 2.2];
    drawYAxisRight(mainCtx, left + mainW, flowTicks, flowMapY);
    drawXAxisTime(mainCtx, left, top + mainH, mainW, tStart, tEnd);

    drawText(mainCtx, "mmHg", 22, top + 10);
    drawText(mainCtx, "mL/s", left + mainW + 26, top + 10);
    drawText(mainCtx, "s", left + mainW - 4, top + mainH + 26, "right");

    drawLine(mainCtx, state.mainData, "art", "rgba(105,240,174,.98)", 2.3, left, top, mainW, mainH, state.dispMainMin, state.dispMainMax);
    drawLine(mainCtx, state.mainData, "cuff", "rgba(255,95,109,.96)", 2.0, left, top, mainW, mainH, state.dispMainMin, state.dispMainMax);
    drawLine(mainCtx, state.mainData, "flow", "rgba(128,233,255,.96)", 2.2, left, top, mainW, mainH, 0, 2.2);

    const acLeft = 58, acRight = 18, acTop = 16, acBottom = 42;
    const acW = acRect.width - acLeft - acRight;
    const acH = acRect.height - acTop - acBottom;
    const acZero = acTop + acH / 2;

    drawGrid(acCtx, acLeft, acTop, acW, acH, 10, 6, acZero);

    const acMapY = v => acTop + acH - ((v + state.dispAcAbs) / (2 * state.dispAcAbs)) * acH;
    const acTicks = [-state.dispAcAbs, -state.dispAcAbs/2, 0, state.dispAcAbs/2, state.dispAcAbs].map(v => Math.round(v*10)/10);

    drawYAxisLeft(acCtx, acLeft, acTicks, acMapY);
    drawXAxisTime(acCtx, acLeft, acTop + acH, acW, tStart, tEnd);
    drawText(acCtx, "mmHg", 22, acTop + 10);
    drawText(acCtx, "s", acLeft + acW - 4, acTop + acH + 26, "right");

    drawLine(acCtx, state.acData, "ac", "rgba(255,95,109,.96)", 2.1, acLeft, acTop, acW, acH, -state.dispAcAbs, state.dispAcAbs);
  }

  function normalizeState(){
    if (state.sbp < state.dbp + 10) state.sbp = state.dbp + 10;
    if (state.dbp > state.sbp - 10) state.dbp = state.sbp - 10;
    updateMapLimits();
    syncUI();
  }

  function tick(now){
    const dt = Math.min(0.05, Math.max(0.001, (now - state.lastTs) / 1000));
    state.lastTs = now;
    state.t += dt;

    const art = arterialPressureAt(state.t);
    const ac = cuffACAt(state.t);
    const cuffTotal = state.cuff + ac;
    const flow = radialFlowAt(state.t);

    state.art = art;
    state.flow = flow;

    pushPoint(state.t, art, cuffTotal, flow, ac);
    updateScales();
    syncUI();
    drawCharts();
    requestAnimationFrame(tick);
  }

  els.cuffSlider.addEventListener("input", e => {
    state.cuff = Number(e.target.value);
    syncUI();
  });

  window.addEventListener("resize", () => {
    resizeAll();
    drawCharts();
  });

  updateMapLimits();
  syncUI();
  resizeAll();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
