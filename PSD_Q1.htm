<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Marés Exoplanetárias</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-panel: #161e2d;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-top: 0; color: var(--text-main); font-weight: 600; margin-bottom: 5px; }
        .subtitle { color: var(--text-muted); margin-bottom: 25px; text-align: center; }
        .dashboard { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; background-color: var(--bg-panel); padding: 15px 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 960px; box-sizing: border-box; }
        .clock { font-family: 'Courier New', Courier, monospace; font-size: 1.8em; font-weight: bold; color: var(--warning); background: #000; padding: 8px 20px; border-radius: 6px; border: 1px solid #444; letter-spacing: 1px; margin-right: auto; }
        button { background-color: var(--accent); color: white; border: none; padding: 10px 20px; font-size: 1em; font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        button:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        button.paused { background-color: var(--danger); }
        button.paused:hover { background-color: #dc2626; }
        button.secondary { background-color: #475569; }
        button.secondary:hover { background-color: #334155; }
        .container { display: flex; flex-direction: row; gap: 20px; margin-bottom: 20px; width: 100%; max-width: 1000px; justify-content: center; }
        .canvas-container { background-color: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; }
        .canvas-header { font-size: 1.1em; font-weight: 600; color: var(--text-muted); margin-top: 0; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        canvas { display: block; cursor: crosshair; border-radius: 6px; background-color: #000; }
        .controls { background-color: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 100%; max-width: 960px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; gap: 40px; justify-content: center; align-items: center; box-sizing: border-box; }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        input[type=range] { width: 250px; cursor: pointer; accent-color: var(--accent); }
        label { margin-bottom: 8px; font-weight: 600; color: var(--text-muted); }
        .value-display { color: var(--accent); font-family: monospace; font-size: 1.2em; margin-top: 5px; font-weight: bold;}
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .modal-content { background-color: var(--bg-panel); margin: 10% auto; padding: 30px; border: 1px solid var(--border); border-radius: 12px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); position: relative; }
        .close { color: var(--text-muted); float: right; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 20px; }
        .close:hover { color: white; }
        .modal h2 { margin-top: 0; color: white; font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9em; }
        .input-group input { width: 100%; padding: 10px; background-color: #0b0f19; border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 1em; box-sizing: border-box; }
        .input-group input:focus { outline: none; border-color: var(--accent); }
    </style>
</head>
<body>

    <h1>Laboratório Virtual: Marés Exoplanetárias</h1>

    <div class="dashboard">
        <div class="clock" id="clockDisplay">00:00</div>
        <button id="playPauseBtn">⏸ Pausar Simulação</button>
        <button id="btnOpenExport" class="secondary">💾 Extrair Dados (CSV)</button>
    </div>
    
    <div class="container">
        <div class="canvas-container">
            <div class="canvas-header">Monitor Orbital</div>
            <canvas id="spaceCanvas" width="450" height="450"></canvas>
        </div>
        <div class="canvas-container">
            <div class="canvas-header">Osciloscópio (Sensor Fixo)</div>
            <canvas id="graphCanvas" width="500" height="450"></canvas>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="timeSpeed">Velocidade da Simulação</label>
            <input type="range" id="timeSpeed" min="0.01" max="1" value="0.2" step="0.01">
            <span class="value-display" id="timeVal">0.20x</span>
        </div>
        <div style="color: var(--text-muted); font-size: 0.85em; line-height: 1.6; border-left: 2px solid var(--border); padding-left: 20px; min-width: 250px;">
            <b style="color: white;">CÓDIGO DE IDENTIFICAÇÃO (HASH):</b><br>
            <span id="hashDisplay" style="color:var(--warning); font-family: monospace; font-size: 0.85em; word-break: break-all; display: inline-block; margin-top: 5px; padding: 5px; background: #000; border-radius: 4px; border: 1px solid #444;">Gerando Segurança...</span>
        </div>
    </div>

    <div id="exportModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Configuração da Aquisição</h2>
            <div class="input-group">
                <label for="samplePeriod">Período de Amostragem (horas)</label>
                <input type="number" id="samplePeriod" value="1.0" min="0.1" step="0.1">
            </div>
            <div class="input-group">
                <label for="acqTime">Tempo de Aquisição Total (horas)</label>
                <input type="number" id="acqTime" value="24" min="1" step="1">
            </div>
            <button id="btnGenerateCSV" style="width: 100%; justify-content: center; padding: 12px; font-size: 1.1em; margin-top: 10px;">
                Gerar e Baixar .CSV
            </button>
        </div>
    </div>
