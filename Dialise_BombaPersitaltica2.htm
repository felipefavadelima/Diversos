<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação: Bomba Peristáltica</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        canvas {
            background: #181818;
            border-radius: 12px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }
        .panel {
            display: flex;
            flex-direction: column;
            width: 320px;
            justify-content: space-between;
        }
        h1 {
            margin-top: 0;
            font-size: 1.6rem;
            color: #00bcd4;
            letter-spacing: 1px;
        }
        .control-group {
            margin-bottom: 25px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 600;
            color: #bbb;
            font-size: 0.95rem;
        }
        .control-group span.val {
            color: #fff;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #00bcd4;
        }
        .dashboard {
            background: #252525;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #3a3a3a;
        }
        .dash-item {
            margin-bottom: 15px;
        }
        .dash-item:last-child {
            margin-bottom: 0;
        }
        .dash-label {
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .dash-val {
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .val-flow { color: #00e5ff; }
        .val-pressure { color: #ff5252; }
        .unit { font-size: 1rem; color: #aaa; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="simCanvas" width="500" height="400"></canvas>
    <div class="panel">
        <div>
            <h1>Bomba Peristáltica</h1>
            <p style="color: #777; font-size: 0.85rem; line-height: 1.4; margin-bottom: 25px;">
                Simulação de deslocamento positivo. Ajuste a válvula para ver o impacto da resistência hidráulica na linha.
            </p>
            
            <div class="control-group">
                <label>Velocidade do Motor <span class="val" id="rpmLabel">60 RPM</span></label>
                <input type="range" id="rpmSlider" min="0" max="200" value="60">
            </div>
            
            <div class="control-group">
                <label>Fechamento da Válvula <span class="val" id="resLabel">20%</span></label>
                <input type="range" id="resSlider" min="0" max="100" value="20">
            </div>
        </div>

        <div class="dashboard">
            <div class="dash-item">
                <div class="dash-label">Fluxo Instantâneo</div>
                <div class="dash-val val-flow" id="fluxoVal">0.0 <span class="unit">mL/min</span></div>
            </div>
            <div class="dash-item">
                <div class="dash-label">Pressão da Linha</div>
                <div class="dash-val val-pressure" id="pressaoVal">0.00 <span class="unit">bar</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    // Elementos da UI
    const rpmSlider = document.getElementById('rpmSlider');
    const resSlider = document.getElementById('resSlider');
    const rpmLabel = document.getElementById('rpmLabel');
    const resLabel = document.getElementById('resLabel');
    const fluxoVal = document.getElementById('fluxoVal');
    const pressaoVal = document.getElementById('pressaoVal');

    // Variáveis da Física
    let theta = 0; // Ângulo do rotor
    let particles = [];
    let spawnTimer = 0;
    let lastTime = performance.now();
    
    let smooth_Q = 0;
    let smooth_P = 0;

    // Pré-preencher a tubulação com fluido
    for(let d = 0; d < 614; d += 12) {
        particles.push({ d: d });
    }

    // Calcula a posição XY de uma partícula com base na distância percorrida 'd'
    function getParticlePos(d) {
        // Entrada reta
        if (d < 50) return { x: 450 - d, y: 250 };
        d -= 50;
        // Curva da bomba (semicírculo inferior)
        if (d < 314.159) {
            let angle = d / 100; // Raio = 100
            return { x: 300 + 100 * Math.cos(angle), y: 250 + 100 * Math.sin(angle) };
        }
        d -= 314.159;
        // Saída reta horizontal
        if (d < 50) return { x: 200 - d, y: 250 };
        d -= 50;
        // Saída reta vertical (passando pela válvula)
        if (d < 200) return { x: 150, y: 250 - d };
        return null;
    }

    // Calcula a deformação dinâmica da mangueira causada pelos roletes
    function getDeformedRadius(anglePos) {
        let r_inner = 90; // Parede interna normal
        for(let i = 0; i < 3; i++) {
            let roller_ang = ((theta + i * 2 * Math.PI / 3) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
            let delta = Math.abs(anglePos - roller_ang);
            if (delta > Math.PI) delta = 2 * Math.PI - delta;
            
            let pinch_width = 0.4; // Alcance do "amassamento" em radianos
            if (delta < pinch_width) {
                // Curva de sino suave para esmagamento contra a parede (Raio máx = 110)
                let deform = 10 * (1 + Math.cos(delta * Math.PI / pinch_width));
                r_inner = Math.max(r_inner, 90 + deform);
            }
        }
        return r_inner;
    }

    // Cria o path da mangueira deformada para desenho e clipping
    function buildDeformedTubePath() {
        ctx.beginPath();
        ctx.arc(300, 250, 110, 0, Math.PI, false); // Parede externa estática
        // Parede interna deforma em contato com os roletes
        for(let a = Math.PI; a >= 0; a -= 0.05) {
            let r = getDeformedRadius(a);
            ctx.lineTo(300 + r * Math.cos(a), 250 + r * Math.sin(a));
        }
        ctx.closePath();
    }

    function loop(now) {
        let dt = now - lastTime;
        lastTime = now;
        if (dt > 100) dt = 16; // Previne saltos grandes caso o usuário mude de aba

        // Leituras UI
        let rpm = parseFloat(rpmSlider.value);
        let resistance = parseFloat(resSlider.value);
        
        rpmLabel.innerText = rpm + ' RPM';
        resLabel.innerText = resistance + '%';

        // FÍSICA DA BOMBA
        // 1. Fluxo ideal volumétrico
        let Q_ideal = rpm * 10; 
        
        // 2. Fluxo real sofre vazamento/escorregamento dependendo da pressão (resistência da válvula)
        let Q_actual = Q_ideal / (1 + resistance * 0.015);
        
        // 3. Pressão na linha (depende do fluxo que consegue passar pela válvula restrita)
        let Pressure = Q_actual * resistance * 0.0001; 

        // 4. Pulsação: Queda quando um rolete sai da zona de compressão (ângulo Pi)
        let phaseAngle = (theta - Math.PI/3) % (2 * Math.PI / 3);
        if (phaseAngle < 0) phaseAngle += 2 * Math.PI / 3;
        let phase = phaseAngle / (2 * Math.PI / 3);
        // Cria um leve "mergulho" na vazão
        let dip = 0.5 * (Math.exp(-Math.pow(phase, 2) * 50) + Math.exp(-Math.pow(phase - 1, 2) * 50));
        let pulse = 1 - dip;

        // Velocidade visual das partículas (sincronizada com fluxo)
        let V_roller = (rpm / 60) * 2 * Math.PI * 100;
        let V_fluid = V_roller * (Q_ideal > 0 ? Q_actual / Q_ideal : 0);
        let V_fluid_inst = V_fluid * pulse;

        // Atualiza a Rotação
        theta += (rpm / 60) * 2 * Math.PI * (dt / 1000);

        // Movimento do fluido
        spawnTimer += V_fluid_inst * (dt / 1000);
        while(spawnTimer > 12) {
            spawnTimer -= 12;
            particles.push({ d: spawnTimer });
        }
        for(let i = particles.length - 1; i >= 0; i--) {
            particles[i].d += V_fluid_inst * (dt / 1000);
            if (particles[i].d > 614) particles.splice(i, 1);
        }

        // Suaviza as métricas para leitura
        smooth_Q += (Q_actual * pulse - smooth_Q) * 0.3;
        smooth_P += (Pressure * pulse - smooth_P) * 0.3;
        fluxoVal.innerHTML = Math.max(0, smooth_Q).toFixed(1) + ' <span class="unit">mL/min</span>';
        pressaoVal.innerHTML = Math.max(0, smooth_P).toFixed(2) + ' <span class="unit">bar</span>';

        // --- RENDERIZAÇÃO GRÁFICA ---
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Tubulações Estáticas (Background)
        ctx.lineWidth = 20;
        ctx.lineCap = 'butt';
        ctx.lineJoin = 'round';
        
        ctx.strokeStyle = '#222'; // Fundo do cano
        // Entrada
        ctx.beginPath(); ctx.moveTo(450, 250); ctx.lineTo(400, 250); ctx.stroke();
        // Saída
        ctx.beginPath(); ctx.moveTo(200, 250); ctx.lineTo(150, 250); ctx.lineTo(150, 50); ctx.stroke();

        // Paredes das Tubulações Estáticas
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#444';
        ctx.beginPath(); ctx.moveTo(450, 240); ctx.lineTo(400, 240); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(450, 260); ctx.lineTo(400, 260); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(200, 240); ctx.lineTo(160, 240); ctx.lineTo(160, 50); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(200, 260); ctx.lineTo(140, 260); ctx.lineTo(140, 50); ctx.stroke();

        // Válvula de Restrição (Resistência)
        ctx.fillStyle = '#ff5252';
        let blockR = (resistance / 100) * 9.5; // Max 9.5px deixa 1px de fresta
        ctx.fillRect(130, 100, 10 + blockR, 20); // Bloco Esq
        ctx.fillRect(160 - blockR, 100, 10 + blockR, 20); // Bloco Dir

        // Mangueira da Bomba (Base Deformável)
        buildDeformedTubePath();
        ctx.fillStyle = '#111';
        ctx.fill();
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Partículas (Fluido)
        ctx.fillStyle = '#00e5ff';
        ctx.shadowColor = '#00e5ff';
        ctx.shadowBlur = rpm > 0 ? 4 : 0;
        
        // 1. Partículas fora da área da bomba (retas)
        for(let p of particles) {
            if (p.d < 50 || p.d > 364.15) {
                let pos = getParticlePos(p.d);
                if(pos) {
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, 4, 0, Math.PI*2); ctx.fill();
                }
            }
        }

        // 2. Partículas dentro da bomba (com clipping da deformação!)
        ctx.save();
        buildDeformedTubePath();
        ctx.clip(); // Isso faz o fluido "desaparecer" magicamente na área de esmagamento
        
        ctx.fillStyle = 'rgba(0, 188, 212, 0.15)';
        ctx.fill(); // Tintura base do fluido

        ctx.fillStyle = '#00e5ff';
        for(let p of particles) {
            if (p.d >= 50 && p.d <= 364.15) {
                let pos = getParticlePos(p.d);
                if(pos) {
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, 4, 0, Math.PI*2); ctx.fill();
                }
            }
        }
        ctx.restore();
        ctx.shadowBlur = 0;

        // Estator da Bomba (Carcaça externa guia)
        ctx.beginPath();
        ctx.arc(300, 250, 115, 0, Math.PI, false);
        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 10;
        ctx.stroke();

        // Rotor e Roletes
        ctx.beginPath(); ctx.arc(300, 250, 25, 0, Math.PI*2); 
        ctx.fillStyle = '#333'; ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = '#111'; ctx.stroke();

        for(let i = 0; i < 3; i++) {
            let roller_ang = theta + i * 2 * Math.PI / 3;
            let rx = 300 + 85 * Math.cos(roller_ang);
            let ry = 250 + 85 * Math.sin(roller_ang);
            
            // Braço do Rotor
            ctx.beginPath();
            ctx.moveTo(300, 250);
            ctx.lineTo(rx, ry);
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 14;
            ctx.stroke();
            
            // Corpo do Rolete
            ctx.beginPath();
            ctx.arc(rx, ry, 25, 0, Math.PI*2);
            ctx.fillStyle = '#cfcfcf';
            ctx.fill();
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Eixo do Rolete
            ctx.beginPath();
            ctx.arc(rx, ry, 6, 0, Math.PI*2);
            ctx.fillStyle = '#222';
            ctx.fill();
        }

        // Setas Direcionais
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.moveTo(430, 240); ctx.lineTo(415, 250); ctx.lineTo(430, 260); ctx.fill();
        ctx.beginPath(); ctx.moveTo(140, 70); ctx.lineTo(150, 55); ctx.lineTo(160, 70); ctx.fill();

        requestAnimationFrame(loop);
    }

    // Iniciar
    requestAnimationFrame(loop);
</script>
</body>
</html>
