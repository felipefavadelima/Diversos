<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador CSV</title>
  <style>
    :root{
      --bg:#0a0f14;
      --panel:#141b22;
      --panel2:#1b2530;
      --txt:#e6edf3;
      --muted:#9fb0c0;
      --blue:#58a6ff;
      --green:#3fb950;
      --scope:#020604;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--txt);
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:18px;
    }
    .card{
      background:var(--panel);
      border:1px solid #263241;
      border-radius:14px;
      padding:14px;
      margin-bottom:14px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
    }
    label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }
    input{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #324255;
      background:var(--panel2);
      color:var(--txt);
      font-size:15px;
    }
    button{
      padding:10px 14px;
      border:0;
      border-radius:10px;
      font-size:15px;
      cursor:pointer;
      margin-right:8px;
      margin-top:10px;
    }
    .b1{background:var(--blue);color:#fff}
    .b2{background:var(--green);color:#04160a;font-weight:bold}
    .b2:disabled{opacity:.5;cursor:not-allowed}
    canvas{
      width:100%;
      height:400px;
      display:block;
      border-radius:12px;
      border:1px solid #2d3b4d;
      background:var(--scope);
    }
    #status{
      font-size:13px;
      color:var(--muted);
      margin-top:10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="grid">
        <div>
          <label for="duration">Aquisição (s)</label>
          <input id="duration" type="number" min="1" step="1" value="30">
        </div>
        <div>
          <label for="fsOut">CSV (Hz)</label>
          <input id="fsOut" type="number" min="1" step="1" value="200">
        </div>
      </div>
      <div>
        <button class="b1" id="btnGenerate">Gerar</button>
        <button class="b2" id="btnDownload" disabled>CSV</button>
      </div>
      <div id="status"></div>
    </div>

    <div class="card">
      <canvas id="scope" width="1100" height="400"></canvas>
    </div>
  </div>

  <script>
    const INTERNAL_FS = 10000;
    const SCOPE_WINDOW = 5.0;
    const SHIFT_HOURS = 8.0;
    const CONTACT_HOURS = 2.0;

    function referenceExposureLevel() {
      const base = 12;
      const divisor = Math.pow(2, 2);
      return base / divisor;
    }

    function targetWeightedLevel() {
      return referenceExposureLevel() / Math.sqrt(CONTACT_HOURS / SHIFT_HOURS);
    }

    let generatedCSV = "";

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function randn(rng) {
      let u = 0, v = 0;
      while (u === 0) u = rng();
      while (v === 0) v = rng();
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }

    function polyScale(a, s) {
      return a.map(v => v * s);
    }

    function polyConv(a, b) {
      const out = new Array(a.length + b.length - 1).fill(0);
      for (let i = 0; i < a.length; i++) {
        for (let j = 0; j < b.length; j++) out[i + j] += a[i] * b[j];
      }
      return out;
    }

    function polyPow(base, n) {
      let out = [1];
      for (let i = 0; i < n; i++) out = polyConv(out, base);
      return out;
    }

    function bilinearTransform(num, den, fs) {
      const N = Math.max(num.length - 1, den.length - 1);
      const c = 2 * fs;

      function transformPolyDesc(polyDesc) {
        const order = polyDesc.length - 1;
        let acc = new Array(N + 1).fill(0);
        for (let i = 0; i < polyDesc.length; i++) {
          const coef = polyDesc[i];
          const p = order - i;
          const part1 = polyPow([1, -1], p);
          const part2 = polyPow([1, 1], N - p);
          let term = polyConv(part1, part2);
          term = polyScale(term, coef * Math.pow(c, p));
          for (let k = 0; k < term.length; k++) acc[k] += term[k];
        }
        return acc;
      }

      let bz = transformPolyDesc(num);
      let az = transformPolyDesc(den);
      const a0 = az[0];
      bz = bz.map(v => v / a0);
      az = az.map(v => v / a0);
      return { b: bz, a: az };
    }

    function filterIIR(b, a, x) {
      const y = new Float64Array(x.length);
      for (let n = 0; n < x.length; n++) {
        let acc = 0;
        for (let k = 0; k < b.length; k++) if (n - k >= 0) acc += b[k] * x[n - k];
        for (let k = 1; k < a.length; k++) if (n - k >= 0) acc -= a[k] * y[n - k];
        y[n] = acc;
      }
      return y;
    }

    function rms(x) {
      let s = 0;
      for (let i = 0; i < x.length; i++) s += x[i] * x[i];
      return Math.sqrt(s / x.length);
    }

    function removeMean(x) {
      let m = 0;
      for (let i = 0; i < x.length; i++) m += x[i];
      m /= x.length;
      const y = new Float64Array(x.length);
      for (let i = 0; i < x.length; i++) y[i] = x[i] - m;
      return y;
    }

    function stableSeed(durationSec, fsOut) {
      const a = Math.floor(durationSec * 1000);
      const b = Math.floor(fsOut * 37);
      return ((a ^ b ^ 0xA53C9E21) >>> 0);
    }

    function generateRawSignal(durationSec, fs, durationDependentSeed) {
      const N = Math.max(1, Math.floor(durationSec * fs));
      const x = new Float64Array(N);
      const rng = mulberry32(durationDependentSeed);

      const freqs = [12, 18, 31, 47, 73, 95, 140, 220];
      const amps  = [0.90, 0.75, 0.65, 0.50, 0.40, 0.32, 0.24, 0.16];
      const phases = freqs.map(() => 2 * Math.PI * rng());
      let noiseState = 0;

      for (let n = 0; n < N; n++) {
        const t = n / fs;
        let s = 0;

        for (let k = 0; k < freqs.length; k++) {
          s += amps[k] * Math.sin(2 * Math.PI * freqs[k] * t + phases[k]);
        }

        const env =
          1.0
          + 0.22 * Math.sin(2 * Math.PI * 0.35 * t + 0.4)
          + 0.10 * Math.sin(2 * Math.PI * 0.12 * t + 1.2);

        const w = randn(rng);
        noiseState = 0.985 * noiseState + 0.18 * w;
        s += 0.75 * noiseState;

        if (rng() < 0.0006) s += (rng() - 0.5) * 6.0;
        x[n] = env * s;
      }

      return removeMean(x);
    }

    function resampleLinear(x, fsIn, fsOut, durationSec) {
      const Nout = Math.max(1, Math.floor(durationSec * fsOut));
      const y = new Float64Array(Nout);
      const t = new Float64Array(Nout);

      for (let i = 0; i < Nout; i++) {
        const ti = i / fsOut;
        t[i] = ti;

        const idx = ti * fsIn;
        const i0 = Math.floor(idx);
        const i1 = Math.min(i0 + 1, x.length - 1);
        const frac = idx - i0;

        const v0 = x[Math.min(i0, x.length - 1)];
        const v1 = x[i1];
        y[i] = v0 + frac * (v1 - v0);
      }
      return { t, y };
    }

    function toCSV(t, y) {
      let lines = ["t(s),ah(m/s²)"];
      for (let i = 0; i < t.length; i++) {
        lines.push(`${t[i].toFixed(6)},${y[i].toFixed(6)}`);
      }
      return lines.join("\n");
    }

    function downloadText(filename, text) {
      const blob = new Blob([text], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function drawScope(canvas, t, y) {
      const ctx = canvas.getContext("2d");
      const W = canvas.width;
      const H = canvas.height;

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#020604";
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = "#103010";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 10; i++) {
        const x = (i / 10) * W;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let i = 0; i <= 8; i++) {
        const y0 = (i / 8) * H;
        ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(W, y0); ctx.stroke();
      }

      ctx.strokeStyle = "#1f6f1f";
      ctx.beginPath();
      ctx.moveTo(0, H / 2);
      ctx.lineTo(W, H / 2);
      ctx.stroke();

      const tMax = Math.min(SCOPE_WINDOW, t[t.length - 1] || SCOPE_WINDOW);
      let endIdx = t.length - 1;
      for (let i = 0; i < t.length; i++) {
        if (t[i] > tMax) { endIdx = i; break; }
      }

      let maxAbs = 1e-9;
      for (let i = 0; i <= endIdx; i++) {
        const a = Math.abs(y[i]);
        if (a > maxAbs) maxAbs = a;
      }
      maxAbs *= 1.15;

      ctx.strokeStyle = "#7CFC00";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i = 0; i <= endIdx; i++) {
        const xx = (t[i] / tMax) * W;
        const yy = H / 2 - (y[i] / maxAbs) * (H * 0.42);
        if (i === 0) ctx.moveTo(xx, yy);
        else ctx.lineTo(xx, yy);
      }
      ctx.stroke();
    }

    function weightingFilterAt(fs) {
      const pi = Math.PI;
      const f1 = 6.310, f2 = 1258.9, Q1 = 0.71;
      const f3 = 15.915, f4 = 15.915, Q2 = 0.64, K = 1.0;

      const numHb = [4 * pi * pi * f2 * f2, 0, 0];
      const den1 = [1, 2 * pi * f1 / Q1, 4 * pi * pi * f1 * f1];
      const den2 = [1, 2 * pi * f2 / Q1, 4 * pi * pi * f2 * f2];
      const denHb = polyConv(den1, den2);

      const numHw = [
        (2 * pi * K * f4 * f4),
        (2 * pi * K * f4 * f4) * (2 * pi * f3)
      ];
      const denHw = [
        f3,
        f3 * (2 * pi * f4 / Q2),
        f3 * (4 * pi * pi * f4 * f4)
      ];

      return bilinearTransform(polyConv(numHb, numHw), polyConv(denHb, denHw), fs);
    }

    function exposureNormalize(weightedRms) {
      return weightedRms * Math.sqrt(CONTACT_HOURS / SHIFT_HOURS);
    }

    function generate() {
      const duration = parseFloat(document.getElementById("duration").value);
      const fsOut = parseFloat(document.getElementById("fsOut").value);
      const status = document.getElementById("status");

      if (!(duration > 0) || !(fsOut > 0)) {
        alert("Valores inválidos.");
        return;
      }

      status.textContent = "Gerando...";

      setTimeout(() => {
        try {
          const seed = stableSeed(duration, fsOut);
          let rawInternal = generateRawSignal(duration, INTERNAL_FS, seed);

          const digital = weightingFilterAt(INTERNAL_FS);
          let weighted = filterIIR(digital.b, digital.a, rawInternal);
          const initialWeighted = rms(weighted);

          if (initialWeighted < 1e-12) throw new Error("Falha na calibração.");

          const target = targetWeightedLevel();
          const gain = target / initialWeighted;

          for (let i = 0; i < rawInternal.length; i++) rawInternal[i] *= gain;

          const out = resampleLinear(rawInternal, INTERNAL_FS, fsOut, duration);
          generatedCSV = toCSV(out.t, out.y);

          drawScope(document.getElementById("scope"), out.t, out.y);
          document.getElementById("btnDownload").disabled = false;
          status.textContent = "Pronto.";
        } catch (e) {
          console.error(e);
          status.textContent = "Erro.";
        }
      }, 20);
    }

    document.getElementById("btnGenerate").addEventListener("click", generate);
    document.getElementById("btnDownload").addEventListener("click", () => {
      if (!generatedCSV) return;
      const duration = parseFloat(document.getElementById("duration").value);
      const fsOut = parseFloat(document.getElementById("fsOut").value);
      downloadText(`sinal_${duration}s_${fsOut}Hz.csv`, generatedCSV);
    });
  </script>
</body>
</html>
