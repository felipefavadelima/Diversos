<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Marés Profissional</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-panel: #161e2d;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-top: 0; color: var(--text-main); font-weight: 600; margin-bottom: 5px; }
        .subtitle { color: var(--text-muted); margin-bottom: 25px; text-align: center; }
        
        /* Painel Superior (Dashboard) */
        .dashboard {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            background-color: var(--bg-panel);
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 960px;
            box-sizing: border-box;
        }

        .clock {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8em;
            font-weight: bold;
            color: var(--warning);
            background: #000;
            padding: 8px 20px;
            border-radius: 6px;
            border: 1px solid #444;
            letter-spacing: 1px;
            margin-right: auto; /* Empurra os botões para a direita */
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        button.paused { background-color: var(--danger); }
        button.paused:hover { background-color: #dc2626; }
        button.secondary { background-color: #475569; }
        button.secondary:hover { background-color: #334155; }

        /* Contêiner das Telas */
        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }

        .canvas-container {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-header {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        canvas { display: block; cursor: crosshair; border-radius: 6px; background-color: #000; }
        
        /* Controles Inferiores */
        .controls {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 960px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .control-group { display: flex; flex-direction: column; align-items: center; }
        input[type=range] { width: 250px; cursor: pointer; accent-color: var(--accent); }
        label { margin-bottom: 8px; font-weight: 600; color: var(--text-muted); }
        .value-display { color: var(--accent); font-family: monospace; font-size: 1.2em; margin-top: 5px; font-weight: bold;}
        
        /* Modal Styles */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.7); 
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--bg-panel);
            margin: 10% auto; 
            padding: 30px;
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            position: relative;
        }

        .close {
            color: var(--text-muted);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 20px;
        }
        .close:hover { color: white; }

        .modal h2 { margin-top: 0; color: white; font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9em; }
        .input-group input {
            width: 100%;
            padding: 10px;
            background-color: #0b0f19;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            font-size: 1em;
            box-sizing: border-box;
        }
        .input-group input:focus { outline: none; border-color: var(--accent); }

    </style>
</head>
<body>

    <h1>Laboratório Virtual de Marés</h1>

    <div class="dashboard">
        <div class="clock" id="clockDisplay">DIA 01 - 00:00</div>
        <button id="playPauseBtn">⏸ Pausar Simulação</button>
        <button id="btnOpenExport" class="secondary">💾 Extrair Dados (CSV)</button>
    </div>
    
    <div class="container">
        <div class="canvas-container">
            <div class="canvas-header">Monitor Orbital</div>
            <canvas id="spaceCanvas" width="450" height="450"></canvas>
        </div>

        <div class="canvas-container">
            <div class="canvas-header">Osciloscópio (Sensor Fixo)</div>
            <canvas id="graphCanvas" width="500" height="450"></canvas>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="timeSpeed">Velocidade da Simulação (Multiplicador)</label>
            <input type="range" id="timeSpeed" min="0.1" max="5" value="0.2" step="0.1">
            <span class="value-display" id="timeVal">1.0x</span>
        </div>
        <div style="color: var(--text-muted); font-size: 0.85em; line-height: 1.6; border-left: 2px solid var(--border); padding-left: 20px;">
            <b>PARÂMETROS FÍSICOS DA SIMULAÇÃO:</b><br>
            • Período do Sol: <span style="color:#ffcc00">24.00h</span> <br>
            • Período da Lua: <span style="color:#aaaaaa">24.84h</span> <br>
        </div>
    </div>

    <div id="exportModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Configuração da Aquisição</h2>
            
            <div class="input-group">
                <label for="samplePeriod">Período de Amostragem (horas)</label>
                <input type="number" id="samplePeriod" value="1.0" min="0.1" step="0.1">
            </div>
            
            <div class="input-group">
                <label for="acqTime">Tempo de Aquisição Total (horas)</label>
                <input type="number" id="acqTime" value="24" min="1" step="1">
            </div>

            <button id="btnGenerateCSV" style="width: 100%; justify-content: center; padding: 12px; font-size: 1.1em; margin-top: 10px;">
                Gerar e Baixar .CSV
            </button>
        </div>
    </div>

    <script>
        const spaceCanvas = document.getElementById('spaceCanvas');
        const graphCanvas = document.getElementById('graphCanvas');
        const spaceCtx = spaceCanvas.getContext('2d');
        const graphCtx = graphCanvas.getContext('2d');
        
        const timeSlider = document.getElementById('timeSpeed');
        const timeVal = document.getElementById('timeVal');
        const clockDisplay = document.getElementById('clockDisplay');
        const playPauseBtn = document.getElementById('playPauseBtn');

        // Modal Elements
        const modal = document.getElementById('exportModal');
        const btnOpenExport = document.getElementById('btnOpenExport');
        const spanClose = document.getElementsByClassName('close')[0];
        const btnGenerateCSV = document.getElementById('btnGenerateCSV');

        // Estados da Simulação
        let isPlaying = true;
        let timeHours = 0; 
        
        // Ângulos independentes
        let moonAngle = 0;
        let sunAngle = 0;

        // Físicas (Mantendo compatibilidade com seu modelo)
        const earthRadius = 40;
        const distMoon = 120;
        const distSun = 190;
        const ampMoon = 15; 
        const ampSun = 7;   

        // Histórico do Gráfico
        const history = [];
        const maxHistory = 800;
        let draggingBody = null; 

        // Constantes Matemáticas
        const sunAngularSpeed = (Math.PI * 2) / 24.0;
        const moonAngularSpeed = (Math.PI * 2) / 24.84;

        // --- INTERFACE E BOTÕES ---
        timeSlider.addEventListener('input', () => {
            timeVal.innerText = parseFloat(timeSlider.value).toFixed(1) + "x";
        });

        playPauseBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playPauseBtn.innerHTML = "⏸ Pausar Simulação";
                playPauseBtn.classList.remove('paused');
            } else {
                playPauseBtn.innerHTML = "▶ Retomar Simulação";
                playPauseBtn.classList.add('paused');
            }
        });

        // --- LÓGICA DO MODAL E CSV ---
        btnOpenExport.onclick = () => modal.style.display = "block";
        spanClose.onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; }

        btnGenerateCSV.onclick = () => {
            const freq = parseFloat(document.getElementById('samplePeriod').value);
            const duration = parseFloat(document.getElementById('acqTime').value);

            if (isNaN(freq) || isNaN(duration) || freq <= 0 || duration <= 0) {
                alert("Por favor, insira valores numéricos válidos e maiores que zero.");
                return;
            }

            // Cabeçalho do CSV
            let csvContent = "Tempo_Aquisicao_h,Altura_Mare_m\n";
            let steps = Math.floor(duration / freq);

            // Congela os ângulos iniciais para a projeção
            let baseSunAngle = sunAngle;
            let baseMoonAngle = moonAngle;

            for (let i = 0; i <= steps; i++) {
                let current_t = i * freq;
                
                // Calcula a posição orbital projetada no tempo t
                let projSunAngle = baseSunAngle + current_t * sunAngularSpeed;
                let projMoonAngle = baseMoonAngle + current_t * moonAngularSpeed;

                // Fómula da interferência de ondas (posição da Terra é 0 radianos)
                let tideHeight = ampMoon * Math.cos(2 * (0 - projMoonAngle)) + 
                                 ampSun * Math.cos(2 * (0 - projSunAngle));

                // Formata os números com 3 casas decimais usando ponto como separador
                csvContent += `${current_t.toFixed(3)},${tideHeight.toFixed(3)}\n`;
            }

            // Cria o Blob e força o Download do arquivo
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "dados_mare_sensor.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // Fecha o modal e dá um feedback sutil
            modal.style.display = "none";
            btnOpenExport.innerHTML = "✅ Dados Exportados!";
            setTimeout(() => btnOpenExport.innerHTML = "💾 Extrair Dados (CSV)", 3000);
        };

        // --- ARRASTE COM O MOUSE ---
        function getMousePos(evt) {
            const rect = spaceCanvas.getBoundingClientRect();
            return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
        }

        spaceCanvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);
            const sx = 225 + distSun * Math.cos(sunAngle);
            const sy = 225 + distSun * Math.sin(sunAngle);
            const mx = 225 + distMoon * Math.cos(moonAngle);
            const my = 225 + distMoon * Math.sin(moonAngle);

            if (Math.hypot(pos.x - sx, pos.y - sy) < 30) draggingBody = 'sun';
            else if (Math.hypot(pos.x - mx, pos.y - my) < 25) draggingBody = 'moon';
        });

        window.addEventListener('mouseup', () => draggingBody = null);

        window.addEventListener('mousemove', (e) => {
            if (!draggingBody) return;
            const pos = getMousePos(e);
            let newAngle = Math.atan2(pos.y - 225, pos.x - 225);
            if (newAngle < 0) newAngle += Math.PI * 2;

            if (draggingBody === 'sun') sunAngle = newAngle;
            if (draggingBody === 'moon') moonAngle = newAngle;

            if (!isPlaying) {
                let measuredHeight = drawSpace(225, 225);
                if(history.length > 0) history[history.length - 1] = measuredHeight;
                drawGraph();
            }
        });

        // --- RENDERIZAÇÃO E MATEMÁTICA VISUAL ---
        function updateClock() {
            let totalDays = Math.floor(timeHours / 24) + 1;
            let currentHour = Math.floor(timeHours % 24);
            let currentMinute = Math.floor(((timeHours % 24) - currentHour) * 60);
            
            let dStr = totalDays.toString().padStart(2, '0');
            let hStr = currentHour.toString().padStart(2, '0');
            let mStr = currentMinute.toString().padStart(2, '0');
            
            clockDisplay.innerText = `DIA ${dStr} - ${hStr}:${mStr}`;
        }

        function drawSpace(cx, cy) {
            spaceCtx.clearRect(0, 0, 450, 450);
            const earthAng = 0; 

            // Órbitas
            spaceCtx.lineWidth = 1;
            spaceCtx.beginPath(); spaceCtx.arc(cx, cy, distMoon, 0, Math.PI * 2);
            spaceCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; spaceCtx.stroke();
            spaceCtx.beginPath(); spaceCtx.arc(cx, cy, distSun, 0, Math.PI * 2); spaceCtx.stroke();

            // Sol
            const sx = cx + distSun * Math.cos(sunAngle);
            const sy = cy + distSun * Math.sin(sunAngle);
            spaceCtx.beginPath(); spaceCtx.arc(sx, sy, 22, 0, Math.PI * 2);
            spaceCtx.fillStyle = '#ffcc00';
            spaceCtx.shadowBlur = draggingBody === 'sun' ? 40 : 15;
            spaceCtx.shadowColor = '#ffcc00';
            spaceCtx.fill(); spaceCtx.shadowBlur = 0; 

            // Lua
            const mx = cx + distMoon * Math.cos(moonAngle);
            const my = cy + distMoon * Math.sin(moonAngle);
            spaceCtx.beginPath(); spaceCtx.arc(mx, my, 12, 0, Math.PI * 2);
            spaceCtx.fillStyle = draggingBody === 'moon' ? '#ffffff' : '#aaaaaa';
            spaceCtx.fill();

            // Água (Bulbos)
            spaceCtx.beginPath();
            for (let a = 0; a <= Math.PI * 2; a += 0.05) {
                let r = earthRadius + 
                        ampMoon * Math.cos(2 * (a - moonAngle)) + 
                        ampSun * Math.cos(2 * (a - sunAngle));
                let x = cx + r * Math.cos(a);
                let y = cy + r * Math.sin(a);
                if (a === 0) spaceCtx.moveTo(x, y);
                else spaceCtx.lineTo(x, y);
            }
            spaceCtx.closePath();
            spaceCtx.fillStyle = 'rgba(59, 130, 246, 0.6)'; // Azul moderno
            spaceCtx.fill();

            // Terra
            spaceCtx.beginPath(); spaceCtx.arc(cx, cy, earthRadius, 0, Math.PI * 2);
            spaceCtx.fillStyle = '#10b981'; // Verde moderno
            spaceCtx.fill();

            // Sensor Fixo
            let sensorTideHeight = ampMoon * Math.cos(2 * (earthAng - moonAngle)) + 
                                   ampSun * Math.cos(2 * (earthAng - sunAngle));
            let sensorR = earthRadius + sensorTideHeight;
            let px = cx + sensorR * Math.cos(earthAng);
            let py = cy + sensorR * Math.sin(earthAng);
            
            spaceCtx.beginPath(); spaceCtx.moveTo(cx, cy); spaceCtx.lineTo(px, py);
            spaceCtx.strokeStyle = 'rgba(239, 68, 68, 0.5)'; spaceCtx.lineWidth = 2; spaceCtx.stroke();
            
            spaceCtx.beginPath(); spaceCtx.arc(px, py, 5, 0, Math.PI * 2);
            spaceCtx.fillStyle = '#ef4444'; spaceCtx.fill();

            return sensorTideHeight; 
        }

        function drawGraph() {
            graphCtx.clearRect(0, 0, 500, 450);
            
            // Grid Lines (Estilo Osciloscópio)
            graphCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            graphCtx.lineWidth = 1;
            for(let i=0; i<=450; i+=45) {
                graphCtx.beginPath(); graphCtx.moveTo(0, i); graphCtx.lineTo(500, i); graphCtx.stroke();
            }
            for(let i=0; i<=500; i+=50) {
                graphCtx.beginPath(); graphCtx.moveTo(i, 0); graphCtx.lineTo(i, 450); graphCtx.stroke();
            }

            // Linha Central (Zero)
            graphCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            graphCtx.beginPath(); graphCtx.moveTo(0, 225); graphCtx.lineTo(500, 225); graphCtx.stroke();

            // Desenhar a Onda
            if (history.length > 1) {
                graphCtx.beginPath();
                graphCtx.strokeStyle = '#3b82f6';
                graphCtx.lineWidth = 2;
                graphCtx.lineJoin = 'round';
                
                for (let i = 0; i < history.length; i++) {
                    let x = (i / maxHistory) * 500;
                    let y = 225 - (history[i] * 5); // Fator de escala visual
                    
                    if (i === 0) graphCtx.moveTo(x, y);
                    else graphCtx.lineTo(x, y);
                }
                graphCtx.stroke();
            }
        }

        // --- LOOP PRINCIPAL ---
        function animate() {
            if (isPlaying) {
                let speed = parseFloat(timeSlider.value) * 0.5;
                timeHours += speed;
                updateClock();

                if (draggingBody !== 'sun') sunAngle += sunAngularSpeed * speed;
                if (draggingBody !== 'moon') moonAngle += moonAngularSpeed * speed;

                sunAngle %= Math.PI * 2;
                moonAngle %= Math.PI * 2;

                let measuredHeight = drawSpace(225, 225);
                history.push(measuredHeight);
                if (history.length > maxHistory) history.shift(); 
                
                drawGraph();
            }
            requestAnimationFrame(animate);
        }

        timeVal.innerText = parseFloat(timeSlider.value).toFixed(1) + "x";
        updateClock();
        animate();
    </script>
</body>
</html>
